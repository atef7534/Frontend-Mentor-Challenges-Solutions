<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Social links profile</title>
    <link rel="stylesheet" href="./assets/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <div class="wrapper">
      <img
        class="jessica-img"
        src="./assets/images/avatar-jessica.jpeg"
        alt="Portrait of a woman with a natural afro hairstyle wearing a black top, looking slightly to the side against a plain neutral background." />
      <section id="about-me">
        <h1 id="name">Jessica Randall</h1>
        <p id="description">London, United Kingdom</p>
        <p id="quote">"Front-end developer and avid reader."</p>
      </section>

      <ul id="links">
        <li>GitHub</li>
        <li>Frontend Mentor</li>
        <li>LinkedIn</li>
        <li>Twitter</li>
        <li>Instagram</li>
      </ul>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Atif Yasser</a>.
    </div>
  </body>
</html>
