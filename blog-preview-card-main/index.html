<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="./index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <!-- start coding -->
    <main class="main-content">
      <img
        class="view"
        src="./assets/images/illustration-article.svg"
        alt="Abstract geometric illustration with a yellow background and overlapping black and white rounded rectangles arranged diagonally, with decorative lines and shapes." />
      <div class="script">
        <span class="status">Learning</span>
        <time datetime="2023-12-21">Published 21 Dec 2023</time>
        <h1 class="title">HTML & CSS foundations</h1>
        <p class="txt">
          These languages are the backbone of every website, defining structure,
          content, and presentation
        </p>
        <div class="publisher">
          <img
            class="publisher-photo"
            src="./assets/images/image-avatar.webp"
            alt="Portrait of a young man with short light brown hair looking to the side against a plain background." />
          <span class="publisher-name">Greg Hooper</span>
        </div>
      </div>
    </main>
 
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="https://www.frontendmentor.io/profile/atef7534">Atif Yasser Wassif</a>.
    </footer>
  </body>
</html>
