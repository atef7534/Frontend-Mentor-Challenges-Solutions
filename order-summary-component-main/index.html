<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Order summary card</title>
    <link rel="stylesheet" href="./index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <main id="main-content">
      <img
        class="hero"
        src="./images/illustration-hero.svg"
        alt="Illustration of a person wearing headphones and dancing while listening to music on a smartphone" />
      <h1 class="title">Order Summary</h1>
      <p class="script">
        You can now listen to millions of songs, audiobooks, and podcasts on any
        device anywhere you like!
      </p>
      <div class="action">
        <div class="left">
          <img class="icon" src="./images/icon-music.svg" alt="Music icon" />
          <p class="txt">
            <span class="bold">Annual Plan</span>
            <span class="subscribe">$59.99/year</span>
          </p>
        </div>
        <div class="right">
          <button class="change">Change</button>
        </div>
      </div>
      <div class="payment">
        <button>Proceed to Payment</button>
      </div>
      <div class="cancel">
        <button>Cancel Order</button>
      </div>
    </main>

    <footer class="attribution" data--h-bstatus="0OBSERVED">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://www.frontendmentor.io/profile/atef7534"
        >Atif Yasser Wassif</a
      >.
    </footer>
  </body>
</html>
