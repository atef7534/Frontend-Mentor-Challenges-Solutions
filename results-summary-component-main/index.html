<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="./index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <!-- Solution -->
    <main id="component">
      <div id="results">
        <h1 class="title">Your Result</h1>
        <h2 class="count">76</h2>
        <h3 class="sub-title">Great</h3>
        <p class="txt">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </div>
      <div id="summary">
        <h1 class="title">Summary</h1>
        <ul class="ul-fluency">
          <li class="r">
            <h4 class="reaction item-title">
              <img
                src="./assets/images/icon-reaction.svg"
                alt="Icon for reaction component with a red color."
                class="reaction-img" />Reaction
            </h4>
            <h5 class="grades"><span class="bold">80</span>/ 100</h5>
          </li>
          <li class="m">
            <h4 class="memory item-title">
              <img
                src="./assets/images/icon-memory.svg"
                alt="Icon for memory component with a red color."
                class="memory-img" />Memory
            </h4>
            <h5 class="grades"><span class="bold">92</span>/ 100</h5>
          </li>
          <li class="v1">
            <h4 class="verbal item-title">
              <img
                src="./assets/images/icon-verbal.svg"
                alt="Icon for memory component with a red color."
                class="memory-img" />Verbal
            </h4>
            <h5 class="grades"><span class="bold">61</span>/ 100</h5>
          </li>
          <li class="v2">
            <h4 class="visual item-title">
              <img
                src="./assets/images/icon-visual.svg"
                alt="Icon for visual component with a red color."
                class="visual-img" />Visual
            </h4>
            <h5 class="grades"><span class="bold">73</span>/ 100</h5>
          </li>
        </ul>
        <button class="continue">Continue</button>
      </div>
    </main>

    <!-- Added by Frontendmentor -->
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://www.frontendmentor.io/profile/atef7534">Atif Yasser</a>.
    </div>
  </body>
</html>
